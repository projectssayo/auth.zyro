<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset password · minimal</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;1,500&display=swap');

        :root {
            --bg: #f4f4f2;
            --text-dark: #1a1a1a;
            --text-muted: #666666;
            --accent: #4a5d4e;
            --border-light: rgba(0, 0, 0, 0.08);
            --border-focus: #1a1a1a;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .reset-card {
            background: transparent;
            width: 100%;
            max-width: 420px;
            padding: 2rem 2rem 2.2rem;
            text-align: center;
            opacity: 0;
            transform: translateY(24px);
        }

        .profile-container {
            margin-bottom: 2rem;
            position: relative;
        }

        .profile-img {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            object-fit: cover;
            filter: grayscale(25%);
            border: 1px solid var(--border-light);
            padding: 4px;
            transition: filter 0.4s ease, border-color 0.2s;
        }

        .profile-img:hover {
            filter: grayscale(0%);
            border-color: var(--text-muted);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.1rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
            letter-spacing: -0.02em;
        }

        .email-display {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 2.4rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            word-break: break-word;
        }

        .input-wrapper {
            margin-bottom: 2rem;
            text-align: left;
        }

        .form-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.13em;
            color: var(--text-muted);
            margin-bottom: 0.6rem;
            display: block;
            font-weight: 500;
        }

        .input-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-control {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border-light);
            border-radius: 0;
            padding: 0.65rem 0 0.5rem;
            font-size: 1rem;
            color: var(--text-dark);
            transition: border-color 0.3s ease;
            width: 100%;
            padding-right: 40px;
        }

        .form-control:focus {
            background: transparent;
            outline: none;
            box-shadow: none;
            border-bottom: 1px solid var(--text-dark);
        }

        .form-control::placeholder {
            color: #b5b5b5;
            font-weight: 300;
            font-size: 0.95rem;
        }

        .reveal-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--text-dark);
            transition: width 0.5s cubic-bezier(0.20, 1, 0.30, 1);
        }

        .form-control:focus + .reveal-line {
            width: 100%;
        }

        .eye-button {
            position: absolute;
            right: 0;
            bottom: 12px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .eye-button:hover {
            color: var(--text-dark);
        }

        .eye-button svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 1.5;
            fill: none;
        }

        .btn-reset {
            position: relative;
            width: 100%;
            height: 58px;
            border: 1px solid var(--text-dark);
            background: transparent;
            color: var(--text-dark);
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            overflow: hidden;
            cursor: pointer;
            margin-top: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1), border-color 0.2s;
            border-radius: 0;
        }

        .btn-reset span {
            position: relative;
            z-index: 2;
            transition: color 0.4s ease;
        }

        .liquid {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--text-dark);
            z-index: 1;
        }

        .liquid::after {
            content: "";
            position: absolute;
            top: 0;
            right: -12px;
            width: 24px;
            height: 100%;
            background: var(--text-dark);
            clip-path: polygon(0% 0%, 100% 50%, 0% 100%);
            opacity: 0.95;
        }

        .btn-reset:hover {
            transform: translateY(-2px);
        }

        .btn-reset:hover span {
            color: #fff;
        }

        .btn-reset:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            pointer-events: auto;
        }
        .btn-reset:disabled:hover span {
            color: var(--text-dark);
        }
        .btn-reset:disabled .liquid {
            left: -100% !important;
        }

        .timer-badge {
            display: inline-block;
            margin-left: 8px;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            background: rgba(0,0,0,0.05);
            padding: 2px 8px;
            border-radius: 30px;
            transition: background 0.2s;
        }
        .btn-reset:disabled .timer-badge {
            background: transparent;
            color: var(--text-muted);
        }

        .footer-minimal {
            margin-top: 3.2rem;
            font-size: 0.68rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.18em;
            opacity: 0.6;
        }

        @media (max-width: 480px) {
            .reset-card {
                padding: 1.5rem 1.5rem 1.8rem;
                max-width: 360px;
            }
            h1 {
                font-size: 2rem;
            }
            .btn-reset {
                height: 54px;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 360px) {
            .reset-card {
                padding: 1.2rem;
            }
            .profile-img {
                width: 68px;
                height: 68px;
            }
        }
    </style>
</head>
<body>
    <main class="reset-card" id="mainCard">
        <div class="profile-container">
            <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=150&h=150&q=80" alt="User" class="profile-img" id="profileImg">
        </div>

        <h1>Security</h1>
        <p class="email-display">alexander.vane@studio.com</p>

        <form id="resetForm" onsubmit="return handleReset(event)">
            <div class="input-wrapper">
                <label class="form-label">New password</label>
                <div class="input-container">
                    <input type="password" class="form-control" id="password1" placeholder="Enter new" required>
                    <button type="button" class="eye-button" onclick="togglePassword('password1', this)">
                        <svg viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                    <div class="reveal-line"></div>
                </div>
            </div>

            <div class="input-wrapper">
                <label class="form-label">Confirm password</label>
                <div class="input-container">
                    <input type="password" class="form-control" id="password2" placeholder="Repeat new" required>
                    <button type="button" class="eye-button" onclick="togglePassword('password2', this)">
                        <svg viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                    <div class="reveal-line"></div>
                </div>
            </div>

            <button type="submit" class="btn-reset" id="actionBtn">
                <span id="buttonText">Update credentials</span>
                <span class="timer-badge" id="timerDisplay"></span>
                <div class="liquid"></div>
            </button>
        </form>

        <div class="footer-minimal">
            © All rights reserved to sayoLabs
        </div>
    </main>

    <script>
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type);

            const svg = btn.querySelector('svg');
            if (type === 'text') {
                svg.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                svg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }

        window.onload = () => {
            const card = document.getElementById('mainCard');
            const profile = document.getElementById('profileImg');

            gsap.to(card, {
                opacity: 1,
                y: 0,
                duration: 1.2,
                ease: "power2.out"
            });

            gsap.from(profile, {
                filter: "blur(8px)",
                opacity: 0,
                duration: 1.3,
                delay: 0.3,
                ease: "power2.out"
            });

            const btn = document.getElementById('actionBtn');
            const liquid = btn.querySelector('.liquid');

            function onMouseEnter() {
                if (btn.disabled) return;
                gsap.to(liquid, {
                    left: "0%",
                    duration: 0.65,
                    ease: "power2.inOut"
                });
            }

            function onMouseLeave() {
                if (btn.disabled) return;
                gsap.to(liquid, {
                    left: "100%",
                    duration: 0.65,
                    ease: "power2.inOut",
                    onComplete: () => {
                        gsap.set(liquid, { left: "-100%" });
                    }
                });
            }

            btn._mouseEnterHandler = onMouseEnter;
            btn._mouseLeaveHandler = onMouseLeave;
            btn.addEventListener('mouseenter', onMouseEnter);
            btn.addEventListener('mouseleave', onMouseLeave);
        };

        function handleReset(e) {
            e.preventDefault();
            const btn = document.getElementById('actionBtn');
            if (btn.disabled) return false;

            console.log('🐛 DEBUG: Update credentials button clicked — 10s timer started, then redirect');

            const span = document.getElementById('buttonText');
            const timerSpan = document.getElementById('timerDisplay');

            btn.disabled = true;

            if (btn._mouseEnterHandler && btn._mouseLeaveHandler) {
                btn.removeEventListener('mouseenter', btn._mouseEnterHandler);
                btn.removeEventListener('mouseleave', btn._mouseLeaveHandler);
            }

            const liquid = btn.querySelector('.liquid');
            gsap.killTweensOf(liquid);
            gsap.set(liquid, { left: "-100%" });

            gsap.to(btn, {
                borderColor: "#aaaaaa",
                duration: 0.3
            });

            let secondsLeft = 10;
            timerSpan.innerText = ` ${secondsLeft}s`;

            const interval = setInterval(() => {
                secondsLeft -= 1;
                if (secondsLeft > 0) {
                    timerSpan.innerText = ` ${secondsLeft}s`;
                    console.log(`🐛 DEBUG: ${secondsLeft} second(s) remaining`);
                } else {
                    timerSpan.innerText = '';
                }
            }, 1000);

            setTimeout(() => {
                clearInterval(interval);
                span.innerText = "redirecting...";
                timerSpan.innerText = '';
                console.log('🐛 DEBUG: 10 seconds complete — redirecting to homepage');

                // Redirect to homepage
                window.location.replace("/");
            }, 10000);

            return false;
        }
    </script>
</body>
</html>
