<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token expired · minimal</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;1,500&display=swap');

        :root {
            --bg: #f4f4f2;
            --text-dark: #1a1a1a;
            --text-muted: #666666;
            --accent: #4a5d4e;
            --border-light: rgba(0, 0, 0, 0.08);
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .status-card {
            background: transparent;
            width: 100%;
            max-width: 420px;
            padding: 2rem 2rem 2.2rem;
            text-align: center;
            opacity: 0;
            transform: translateY(24px);
        }

        .icon-container {
            margin-bottom: 2rem;
            position: relative;
        }

        .hourglass-icon {
            width: 76px;
            height: 76px;
            margin: 0 auto;
            border-radius: 50%;
            border: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s;
        }

        .hourglass-icon svg {
            width: 34px;
            height: 34px;
            stroke: var(--text-dark);
            stroke-width: 1.2;
            fill: none;
            transition: stroke 0.2s;
        }

        .hourglass-icon:hover {
            border-color: var(--text-muted);
        }
        .hourglass-icon:hover svg {
            stroke: var(--text-dark);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.1rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
            letter-spacing: -0.02em;
        }

        .message-desc {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 2.8rem;
            font-weight: 400;
            line-height: 1.5;
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn-primary {
            position: relative;
            width: 100%;
            height: 58px;
            border: 1px solid var(--text-dark);
            background: transparent;
            color: var(--text-dark);
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            overflow: hidden;
            cursor: pointer;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1), border-color 0.2s;
            text-decoration: none;
            border-radius: 0;
        }

        .btn-primary span {
            position: relative;
            z-index: 2;
            transition: color 0.4s ease;
        }

        .liquid {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--text-dark);
            z-index: 1;
        }

        .liquid::after {
            content: "";
            position: absolute;
            top: 0;
            right: -12px;
            width: 24px;
            height: 100%;
            background: var(--text-dark);
            clip-path: polygon(0% 0%, 100% 50%, 0% 100%);
            opacity: 0.95;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
        }

        .btn-primary:hover span {
            color: #fff;
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            pointer-events: auto;
        }
        .btn-primary:disabled:hover span {
            color: var(--text-dark);
        }
        .btn-primary:disabled .liquid {
            left: -100% !important;
        }

        .footer-minimal {
            margin-top: 3.2rem;
            font-size: 0.68rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.18em;
            opacity: 0.6;
        }

        .timer-badge {
            display: inline-block;
            margin-left: 8px;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            background: rgba(0,0,0,0.05);
            padding: 2px 8px;
            border-radius: 30px;
            transition: background 0.2s;
        }
        .btn-primary:disabled .timer-badge {
            background: transparent;
            color: var(--text-muted);
        }

        @media (max-width: 480px) {
            .status-card {
                padding: 1.5rem 1.5rem 1.8rem;
                max-width: 360px;
            }
            h1 {
                font-size: 2rem;
            }
            .btn-primary {
                height: 54px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <main class="status-card" id="mainCard">
        <div class="icon-container">
            <div class="hourglass-icon" id="icon">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 22h14M5 2h14M17 5l-5 5-5-5M12 12l5 5-5 5-5-5 5-5"/>
                </svg>
            </div>
        </div>

        <h1>Token expired</h1>
        <p class="message-desc">
            Your password reset link has expired. Request a new one via the app to receive a fresh link in your registered email.
        </p>

        <button class="btn-primary" id="actionBtn" onclick="return handleAction(event)">
            <span id="buttonText">Okay, Thank You</span>
            <span class="timer-badge" id="timerDisplay"></span>
            <div class="liquid"></div>
        </button>

        <div class="footer-minimal">
            © All rights reserved to sayoLabs
        </div>
    </main>

    <script>
        window.onload = () => {
            const card = document.getElementById('mainCard');
            const icon = document.getElementById('icon');

            gsap.to(card, {
                opacity: 1,
                y: 0,
                duration: 1.2,
                ease: "power2.out"
            });

            gsap.from(icon, {
                filter: "blur(6px)",
                opacity: 0,
                scale: 0.95,
                duration: 1.2,
                delay: 0.2,
                ease: "power2.out"
            });

            const btn = document.getElementById('actionBtn');
            const liquid = btn.querySelector('.liquid');

            function onMouseEnter() {
                if (btn.disabled) return;
                gsap.to(liquid, {
                    left: "0%",
                    duration: 0.65,
                    ease: "power2.inOut"
                });
            }

            function onMouseLeave() {
                if (btn.disabled) return;
                gsap.to(liquid, {
                    left: "100%",
                    duration: 0.65,
                    ease: "power2.inOut",
                    onComplete: () => {
                        gsap.set(liquid, { left: "-100%" });
                    }
                });
            }

            btn._mouseEnterHandler = onMouseEnter;
            btn._mouseLeaveHandler = onMouseLeave;
            btn.addEventListener('mouseenter', onMouseEnter);
            btn.addEventListener('mouseleave', onMouseLeave);
        };

        function handleAction(e) {
            e.preventDefault();
            const btn = document.getElementById('actionBtn');
            if (btn.disabled) return false;

            // Debug log to console
            console.log('🐛 DEBUG: Button clicked — starting 10s timer, then redirecting to homepage');

            const span = document.getElementById('buttonText');
            const timerSpan = document.getElementById('timerDisplay');

            btn.disabled = true;

            if (btn._mouseEnterHandler && btn._mouseLeaveHandler) {
                btn.removeEventListener('mouseenter', btn._mouseEnterHandler);
                btn.removeEventListener('mouseleave', btn._mouseLeaveHandler);
            }

            const liquid = btn.querySelector('.liquid');
            gsap.killTweensOf(liquid);
            gsap.set(liquid, { left: "-100%" });

            gsap.to(btn, {
                borderColor: "#aaaaaa",
                duration: 0.3
            });

            let secondsLeft = 10;
            timerSpan.innerText = ` ${secondsLeft}s`;

            const interval = setInterval(() => {
                secondsLeft -= 1;
                if (secondsLeft > 0) {
                    timerSpan.innerText = ` ${secondsLeft}s`;
                    console.log(`🐛 DEBUG: ${secondsLeft} seconds remaining`);
                } else {
                    timerSpan.innerText = '';
                }
            }, 1000);

            setTimeout(() => {
                clearInterval(interval);
                span.innerText = "redirecting...";
                timerSpan.innerText = '';

                console.log('🐛 DEBUG: 10 seconds up — redirecting to homepage');

                // Redirect to homepage
                window.location.replace("/");

            }, 10000);

            return false;
        }
    </script>
</body>
</html>
